<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DQA TaskHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Bright app dashboard tokens */
    :root{
      --bg:#f3f8ff;
      --panel:#ffffff;
      --line:#dbe7f6;
      --line-2:#c6d8ec;
      --text:#142033;
      --muted:#64748b;
      --soft:#eef7ff;
      --primary:#2784ff;
      --primary-2:#1268df;
      --accent:#22d3ee;
      --green:#1cc7a5;
      --yellow:#f5bd26;
      --violet:#9b7bff;
      --rose:#f0637b;
      --ring:rgba(39,132,255,.18);
      --danger:#df2f3f
    }
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:
      radial-gradient(circle at 12% 0%,rgba(34,211,238,.18),transparent 28%),
      radial-gradient(circle at 88% 8%,rgba(155,123,255,.15),transparent 30%),
      linear-gradient(180deg,#f7fbff 0%,#eef6ff 100%);
      color:var(--text);letter-spacing:0}
    .tracking-tight{letter-spacing:0!important}
    .btn{border-radius:10px;padding:8px 12px;font-weight:700;font-size:14px;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid transparent}
    .btn-sm{border-radius:7px;padding:6px 9px;font-size:12px}
    .btn-primary{background:linear-gradient(135deg,var(--primary),#24b6ff);color:#fff;box-shadow:0 10px 22px rgba(39,132,255,.18)}.btn-primary:hover{background:linear-gradient(135deg,var(--primary-2),#0ea5e9)}
    .btn-danger{background:#fff1f3;color:var(--danger);border-color:#ffc8d0}.btn-danger:hover{background:#ffe6eb}
    .btn-amber{background:#fff6d8;color:#9a6300;border-color:#f8da79}.btn-amber:hover{background:#ffefb3}
    .btn-ghost{background:#fff;border-color:var(--line);color:#2c405c}.btn-ghost:hover{background:var(--soft);border-color:#b9d8ff}
    .card{background:rgba(255,255,255,.92);border:1px solid rgba(219,231,246,.9);border-radius:18px;box-shadow:0 20px 50px rgba(40,84,130,.08)}
    .approval-card{background:rgba(255,255,255,.94);border:1px solid rgba(211,226,244,.95);border-radius:20px;overflow:hidden;box-shadow:0 24px 70px rgba(54,91,136,.10);width:100%;max-width:100%;min-width:0}
    .approval-header{padding:22px 22px 18px;border-bottom:1px solid var(--line);background:
      linear-gradient(135deg,rgba(230,246,255,.92),rgba(255,255,255,.96) 44%,rgba(246,240,255,.72))}
    .approval-toolbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:end;padding:16px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#ffffff,#f7fbff)}
    .toolbar-actions{display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-end;gap:10px;min-width:128px}
    .toolbar-actions-right{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-left:auto}
    .bulk-hint{font-size:13px;color:var(--muted);text-align:right;white-space:nowrap}
    .filter-bar{display:grid;grid-template-columns:minmax(220px,2fr) minmax(150px,1fr) repeat(2,minmax(140px,1fr)) minmax(150px,1fr);gap:10px 12px;align-items:end}
    .filter-item{min-width:0}
    .filter-item.filter-search{grid-column:auto}
    .field-label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:5px;letter-spacing:.03em}
    .table-meta{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:10px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fafcff,#fff);font-size:13px;color:var(--muted)}
    .table-meta strong{color:var(--text);font-weight:800}
    .message-banner{margin:0 20px 12px;padding:10px 14px;border-radius:10px;background:#fff1f3;border:1px solid #ffc8d0;color:var(--danger);font-size:13px;font-weight:600}
    .approval-header h2{font-size:1.35rem;line-height:1.25}
    .approval-subtitle{font-size:13px;color:var(--muted);margin-top:4px}
    .metric-row{display:flex;gap:8px;flex-wrap:wrap}
    .metric-chip{border:1px solid #d9e8f8;border-radius:14px;padding:10px 14px;min-width:108px;background:#fff;box-shadow:0 10px 22px rgba(40,84,130,.05)}
    .metric-chip:first-child{border-left:1px solid #d9e8f8}
    .metric-chip:nth-child(1){background:linear-gradient(135deg,#e9f5ff,#fff)}
    .metric-chip:nth-child(2){background:linear-gradient(135deg,#eafff8,#fff)}
    .metric-chip:nth-child(3){background:linear-gradient(135deg,#fff7d8,#fff)}
    .metric-chip .label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:750}
    .metric-chip .value{font-size:22px;line-height:1.1;font-weight:800;color:var(--text);margin-top:3px}
    .field{border:1px solid var(--line-2);border-radius:11px;background:#fff;padding:9px 11px;outline:none;color:var(--text);box-shadow:0 4px 14px rgba(40,84,130,.04)}
    .field:focus{border-color:var(--primary-2);box-shadow:0 0 0 3px var(--ring)}
    .nav-btn{display:flex;width:100%;align-items:center;gap:10px;border-radius:11px;padding:9px 11px;font-weight:750;color:#52647c;text-align:left;border:1px solid transparent;line-height:1.25}
    .nav-btn:hover{background:#f5fbff;color:var(--text);border-color:#dcecff}.nav-btn.active{background:#eaf5ff;color:#0870e5;border-color:#cce5ff;box-shadow:inset 3px 0 0 var(--primary)}
    .nav-section-label{font-size:10px;font-weight:850;letter-spacing:.08em;text-transform:uppercase;color:#8ea0b8;padding:14px 8px 6px}
    .nav-btn .nav-ext{margin-left:auto;font-size:11px;opacity:.55}
    .pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:750;border:1px solid;line-height:1.2}
    .spinner{border:2px solid #d7e3f7;border-top:2px solid var(--primary);border-radius:50%;width:16px;height:16px;animation:spin 1s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    th,td{white-space:nowrap}
    .table-wrap{overflow:auto;border-top:1px solid var(--line);background:#fff;max-width:100%}
    .data-table{border-collapse:separate;border-spacing:0;width:100%;font-size:13px}
    .data-table thead th{position:sticky;top:0;z-index:1;background:#f6fbff;color:#58708e;font-size:11px;letter-spacing:.02em;text-transform:none;font-weight:800;text-align:left;padding:12px 14px;border-bottom:1px solid var(--line)}
    .data-table tbody td{padding:12px 14px;border-bottom:1px solid #e7eff8;vertical-align:middle}
    .data-table tbody tr:nth-child(even){background:#fbfdff}
    .data-table tbody tr:hover{background:#eff8ff}
    .report-table{table-layout:fixed}
    .report-table th,.report-table td{overflow:hidden;text-overflow:ellipsis}
    .report-table .col-check{width:42px}
    .report-table .col-code{width:190px}
    .report-table .col-title{width:330px}
    .report-table .col-person{width:180px}
    .report-table .col-date{width:110px}
    .report-table .col-status{width:145px}
    .report-table .col-note{width:220px}
    .report-table .col-action{width:118px}
    .code-link{font-weight:750;color:var(--primary);text-decoration:none}
    .code-link:hover{text-decoration:underline}
    button.code-link{background:none;border:0;padding:0;cursor:pointer}
    .two-line{display:flex;flex-direction:column;gap:2px;min-width:0}
    .two-line b{color:#171717;font-size:13px;font-weight:700}
    .two-line span{color:var(--muted);font-size:12px}
    .cell-title-wrap{white-space:normal;line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .action-stack{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .action-stack-compact{display:flex;gap:4px;min-width:104px;flex-wrap:wrap}
    .action-stack-compact .btn-sm{padding:5px 8px;font-size:11px;line-height:1.2;justify-content:center}
    .quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
    .quick-card{border:1px solid #dbe7f6;border-radius:18px;background:rgba(255,255,255,.96);padding:14px;box-shadow:0 16px 34px rgba(40,84,130,.07)}
    .quick-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
    .quick-card-title{font-size:15px;line-height:1.35;font-weight:850;color:#0f172a;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .quick-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
    .quick-meta div{border:1px solid #e5edf8;border-radius:12px;background:#f8fbff;padding:8px}
    .quick-meta span{display:block;font-size:10px;font-weight:850;text-transform:uppercase;letter-spacing:.04em;color:#64748b}
    .quick-meta b{display:block;font-size:12px;color:#0f172a;margin-top:3px;white-space:normal}
    .quick-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:12px}
    .quick-actions .btn{width:100%;min-height:38px}
    .quick-topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:16px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#f7fbff)}
    @media(max-width:640px){.quick-grid{grid-template-columns:1fr}.quick-actions{grid-template-columns:1fr}.quick-card{border-radius:16px}.quick-meta{grid-template-columns:1fr}}
    .bulk-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 12px;border-radius:12px;background:linear-gradient(135deg,#eef6ff,#fff);border:1px solid #d4e8ff}
    .bulk-bar .bulk-count{font-size:13px;font-weight:800;color:#1e4f8a;white-space:nowrap}
    .empty-state{padding:44px 16px;text-align:center;color:var(--muted)}
    .empty-state b{display:block;color:var(--text);margin-bottom:4px}
    .app-shell{background:transparent;overflow-x:hidden;display:flex;min-height:100vh;flex-direction:column}
    .global-nav{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:18px;padding:10px 22px;background:rgba(255,255,255,.9);border-bottom:1px solid rgba(219,231,246,.95);backdrop-filter:blur(18px);box-shadow:0 10px 30px rgba(40,84,130,.06)}
    .global-brand{display:flex;align-items:center;gap:10px;min-width:max-content;background:transparent;border:0;padding:0;cursor:pointer}
    .global-brand:focus-visible{outline:3px solid var(--ring);outline-offset:3px;border-radius:14px}
    .global-brand .brand-title{font-weight:850;letter-spacing:-.015em;line-height:1.1}
    .global-brand .brand-subtitle{font-size:11px;color:#71839a;margin-top:2px}
    .global-menu{display:flex;align-items:center;gap:6px;min-width:0;flex:1;overflow-x:auto;scrollbar-width:thin;padding:4px}
    .global-menu-group{display:flex;align-items:center;gap:6px}
    .global-menu-group + .global-menu-group{margin-left:6px;padding-left:10px;border-left:1px solid #e4eef9}
    .global-menu .nav-btn{width:auto;white-space:nowrap;padding:8px 12px}
    .global-actions{display:flex;align-items:center;gap:8px;min-width:max-content}
    .user-chip{display:flex;flex-direction:column;align-items:flex-end;line-height:1.15;padding:6px 10px;border:1px solid #dbe7f6;border-radius:12px;background:#f8fbff;color:#334155;max-width:180px}
    .user-chip b{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .user-chip span{font-size:10px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    @media(max-width:1023px){.global-nav{align-items:flex-start;flex-wrap:wrap;padding:10px 14px}.global-menu{order:3;flex-basis:100%;padding-left:0}.global-actions{margin-left:auto}}
    .topbar{background:rgba(255,255,255,.78);border-bottom:1px solid rgba(219,231,246,.95);backdrop-filter:blur(16px)}
    .brand-mark{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border-radius:13px;box-shadow:0 14px 30px rgba(39,132,255,.24)}
    .story-hero{position:relative;overflow:hidden;border:1px solid #d7e8fb;border-radius:22px;background:linear-gradient(135deg,#ffffff 0%,#eefaff 42%,#f7f1ff 100%);box-shadow:0 18px 42px rgba(40,84,130,.08)}
    .story-hero::after{content:"";position:absolute;right:-90px;top:-110px;width:260px;height:260px;border-radius:999px;background:radial-gradient(circle,rgba(39,132,255,.18),rgba(39,132,255,0) 68%)}
    .story-kicker{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#0ea5e9}
    .story-number{font-size:52px;line-height:.95;font-weight:900;letter-spacing:-.03em;color:#0f172a}
    .insight-card{border:1px solid #dbe7f6;border-radius:18px;background:rgba(255,255,255,.88);padding:16px;box-shadow:0 10px 26px rgba(40,84,130,.05)}
    .insight-card b{display:block;font-size:24px;line-height:1.1;color:#0f172a;margin-top:6px}
    .insight-card span{font-size:12px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
    .overview-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(360px,1fr);gap:16px;align-items:start}
    .spm-mini-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .spm-mini-card{border:1px solid #dbe7f6;border-radius:14px;background:#f8fbff;padding:12px}
    .spm-mini-card .label{font-size:11px;font-weight:850;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
    .spm-mini-card .value{font-size:24px;font-weight:900;color:#0f172a;line-height:1.05;margin-top:5px}
    .spm-progress{height:8px;border-radius:999px;background:#e8f0fa;overflow:hidden}
    .spm-progress span{display:block;height:100%;border-radius:999px}
    .donut-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .donut-card{border:1px solid #dbe7f6;border-radius:16px;background:#fbfdff;padding:14px;text-align:center}
    .donut-svg{width:150px;max-width:100%;height:auto;margin:0 auto}
    .donut-card .donut-title{font-size:12px;font-weight:850;color:#475569;text-transform:uppercase;letter-spacing:.04em}
    .donut-card .donut-value{font-size:22px;font-weight:900;color:#0f172a;margin-top:4px}
    .donut-card .donut-note{font-size:12px;color:#64748b;margin-top:4px}
    @media(max-width:1100px){.overview-grid{grid-template-columns:1fr}.spm-mini-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    .stat-card{position:relative;overflow:hidden}
    .stat-card::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:var(--tone,#22d3ee)}
    .stat-card.blue{--tone:#38bdf8;background:linear-gradient(180deg,#fff,#eef8ff)}
    .stat-card.green{--tone:#1cc7a5;background:linear-gradient(180deg,#fff,#ecfff9)}
    .stat-card.yellow{--tone:#f5bd26;background:linear-gradient(180deg,#fff,#fff8dc)}
    .stat-card.violet{--tone:#9b7bff;background:linear-gradient(180deg,#fff,#f5f0ff)}
    button.stat-card{display:block;width:100%;text-align:left;border:1px solid #dbe7f6;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .12s}
    button.stat-card:hover{box-shadow:0 14px 32px rgba(40,84,130,.1);transform:translateY(-1px)}
    button.stat-card.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(39,132,255,.22),0 14px 32px rgba(39,132,255,.12)}
    .info-tile{border:1px solid #dbe7f6;border-radius:16px;padding:16px;background:#fff;box-shadow:0 12px 28px rgba(40,84,130,.05)}
    .info-tile.blue{background:linear-gradient(135deg,#eaf6ff,#fff)}
    .info-tile.green{background:linear-gradient(135deg,#eafff8,#fff)}
    .info-tile.yellow{background:linear-gradient(135deg,#fff8dc,#fff)}
    .info-tile.violet{background:linear-gradient(135deg,#f3efff,#fff)}
    .task-tile{border:1px solid #dbe7f6;border-radius:16px;padding:16px;background:#fff;min-height:108px;box-shadow:0 12px 28px rgba(40,84,130,.05);cursor:pointer;transition:box-shadow .15s,transform .12s}
    button.task-tile:hover,a.task-tile:hover{box-shadow:0 14px 32px rgba(40,84,130,.1);transform:translateY(-1px)}
    .task-tile.leader{background:linear-gradient(135deg,#eaf6ff,#fff)}
    .task-tile.manager{background:linear-gradient(135deg,#eafff8,#fff)}
    .task-tile.status{background:linear-gradient(135deg,#fff7dc,#fff)}
    .task-tile.tool{background:linear-gradient(135deg,#eef4ff,#fff)}
    .task-tile.tool p{display:none}
    .hr-tool-frame{display:block;width:100%;min-height:min(85vh,920px);border:0;background:#f8fafc}
    .hr-tool-frame.embed-fill{min-height:calc(100vh - 52px);height:calc(100vh - 52px);background:#fff}
    .hr-tool-shell{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 12px 28px rgba(40,84,130,.06)}
    .main-body{width:100%;max-width:none;min-width:0;box-sizing:border-box;overflow-x:hidden}
    .main-body-embed{padding:0!important;max-width:none!important}
    .topbar-embed{padding:10px 16px!important;min-height:0}
    .topbar-embed h1{font-size:1rem;font-weight:700}
    .hr-tool-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#f7fbff)}
    .toast-wrap{position:fixed;right:16px;bottom:16px;z-index:50;display:flex;flex-direction:column;gap:10px;max-width:min(420px,calc(100vw - 32px))}
    .toast{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;box-shadow:0 10px 30px rgba(15,23,42,.12)}
    .toast .t{font-weight:800;color:var(--text);font-size:13px}
    .toast .d{color:var(--muted);font-size:12px;margin-top:2px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);display:grid;place-items:center;z-index:60;padding:16px}
    .modal{width:min(720px,100%);background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 30px 90px rgba(15,23,42,.25);overflow:hidden}
    .modal-h{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .modal-b{padding:16px 18px}
    .modal-f{padding:14px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:#f8fbff}
    .preview-modal{width:min(1100px,calc(100vw - 32px))}
    .preview-frame{width:100%;height:min(76vh,760px);border:1px solid var(--line);border-radius:12px;background:#f8fbff}

    /* Skeleton (boneyard-inspired: subtle, technical, non-distracting) */
    .skel{position:relative;overflow:hidden;background:#eaf1ff;border-radius:10px}
    .skel::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(234,241,255,0) 0%,rgba(255,255,255,.7) 50%,rgba(234,241,255,0) 100%);transform:translateX(-100%);animation:skel-shimmer 1.6s linear infinite}
    @keyframes skel-shimmer{to{transform:translateX(100%)}}
    .skel-soft{background:#f0f6ff}
    .skel-line{height:12px;border-radius:999px}
    .skel-chip{height:18px;border-radius:999px}
    .skel-cell{height:14px;border-radius:8px}
    .skel-row{display:grid;grid-template-columns:44px 150px 160px 360px 160px 110px 110px 130px 1fr;gap:12px;align-items:center;padding:12px 14px;border-bottom:1px solid #eeece7}
    .skel-row .skel{width:100%}
    .skel-overlay{position:absolute;inset:0;background:#fff}
    @media(max-width:1100px){.approval-toolbar{grid-template-columns:1fr}.toolbar-actions{align-items:stretch}.toolbar-actions-right{margin-left:0}.bulk-hint{text-align:left}.filter-bar{grid-template-columns:repeat(2,minmax(0,1fr))}.filter-item.filter-search{grid-column:1/-1}}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.15.1/umd/Recharts.js"></script>
  <script type="text/babel">
    const {useEffect, useMemo, useState} = React;
    const R = window.Recharts || {};
    const {
      ComposedChart, BarChart, Bar, Line, XAxis, YAxis, CartesianGrid,
      Tooltip, Legend, ResponsiveContainer, LabelList
    } = R;
    const hasRecharts = Boolean(ComposedChart && BarChart && ResponsiveContainer);
    const CHART_MARGIN = { top: 40, right: 28, left: 10, bottom: 12 };
    const COMBO_CHART_MARGIN = { top: 56, right: 40, left: 14, bottom: 16 };
    const yDomainHeadroom = (max) => Math.ceil((max || 0) * 1.14);

    function toChartRows(rows){
      return (rows || []).map(r => {
        const total = Number(r.workHours) || 0;
        const ot = Math.min(Number(r.overtime) || 0, total);
        return {
          ...r,
          tasks: Number(r.tasks) || 0,
          people: Number(r.people) || 0,
          regularHours: Math.max(0, total - ot),
          overtime: ot

      if (!r.ok) {
        const htmlErr = /<!DOCTYPE|<html/i.test(text);
        const msg = parsed?.error || (htmlErr
          ? `API Node chưa hoạt động (HTTP ${r.status}). Trên server cần bật ứng dụng Node.js và kiểm tra ${path.startsWith('/') ? path : '/api/health'} — thử mở /api/health phải trả {"ok":true}.`

      }

    function normalizeLeaderReport(row){
      const src = unwrapReportRow(row);
      const pic = get(src, ['picspm','PICSPM']);
      const reporter = pic && /[a-zA-ZÀ-ỹ]/.test(String(pic)) ? pic : get(src, ['assignee','Assignee','reporter','Người lập']);
      const statusRaw = get(src, ['status','trạng thái','Kết quả','kết quả']);
      const conclusion = String(get(src, ['Kết luận trang bìa','conclusion','Kết luận','ket_luan']) || '');
      const changePointsBC = pickChangePointsBC(src);
      const note = changePointsBC || pickReportNote(src, conclusion);
      return {
        id: String(get(src, ['id','ID','Id','reportId','Mã tác vụ','Mã báo cáo']) || ''),
        code: String(get(src, ['code','Mã báo cáo','Mã tác vụ','taskcode','reportCode']) || ''),
        title: String(get(src, ['title','Tiêu đề','Task Name','tên tác vụ','name']) || ''),
        reporter: String(reporter || ''),
        email: String(get(src, ['email','reporterEmail','Email']) || ''),
        submitDate: String(get(src, ['submitDate','Ngày nộp','Ngày cập nhật gần nhất']) || ''),
        wishDate: String(get(src, ['wishDate','Hạn mong muốn']) || ''),
        conclusion,
        changePointsBC,
        note,
        leaderNote: String(get(src, ['Nhận xét trưởng nhóm','TNcomment','Ghi chú trưởng nhóm']) || ''),
        reportUrl: String(get(src, REPORT_URL_KEYS) || ''),
        status: statusCode(statusRaw, 'Pending1'),
        raw: row
      };
    }
    function normalizeManagerReport(row, kind='DQA'){
      const src = unwrapReportRow(row);
      const fallback = kind === 'NCTN' ? 'Pending1' : 'Pending';
      const conclusion = String(get(src, ['Kết luận trang bìa','conclusion','Kết luận','ket_luan']) || '');
      const changePointsBC = pickChangePointsBC(src);
      return {
        id: String(get(src, ['id','ID','Id','Mã tác vụ','Mã báo cáo']) || ''),
        code: String(get(src, ['code','Mã báo cáo','Mã tác vụ','taskcode']) || ''),
        title: String(get(src, ['title','Tiêu đề','Task Name','tên tác vụ','Nội dung']) || ''),
        reporter: String(get(src, ['reporter','Người lập','assignee','PICSPM','Người thực hiện']) || ''),
        submitDate: String(get(src, [
          'submitDate','Ngày nộp','Ngày cập nhật gần nhất','Ngày gửi',
          'Ngày phê duyệt trưởng nhóm','Ngày hoàn thành thực tế','Ngày yêu cầu của các bên'
        ]) || ''),
        wishDate: String(get(src, ['wishDate','Hạn mong muốn','Hạn mong muốn của các bên','Deadline']) || ''),
        conclusion,
        changePointsBC,
        note: changePointsBC || pickReportNote(src, conclusion),
        leaderNote: String(get(src, ['Nhận xét trưởng nhóm','TNcomment','Ghi chú trưởng nhóm']) || ''),
        picNote: String(get(src, ['Nhận xét PIC','PICcomment']) || ''),
        reportUrl: String(get(src, REPORT_URL_KEYS) || ''),
        status: statusCode(get(src, ['status','trạng thái','Kết quả','kết quả']), fallback),
        kind,
        raw: row
      };
    }
    function formatReportNote(it){
      const base = String(it?.changePointsBC || it?.note || '').trim();
      const pic = String(it?.picNote || '').trim();
      if (!base) return pic;
      if (!pic || pic === base) return base;
      return [base, pic].join(' · ');
    }

    function normalizePdForm(row){
      return {
        id: String(get(row, ['id','ID','Id']) || ''),
        taskName: String(get(row, ['TaskItemName','taskitemname','Tên tác vụ','SubtaskName']) || ''),
        taskCode: String(get(row, ['TaskItemCode','taskitemcode','Mã']) || ''),

        pic: String(get(row, ['TaskPIC','taskpic','SubtaskPIC','subtaskpic','PIC']) || ''),
        sentTime: String(get(row, ['Subtasktimesend','subtasktimesend','Thời gian gửi']) || ''),

    function Login({onLogin}){

            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({username,password})

          <div className="grid grid-cols-3 gap-3 text-sm text-slate-600"><div className="info-tile blue"><b className="text-slate-950">Account</b><br/>Đăng nhập</div><div className="info-tile green"><b className="text-slate-950">Role</b><br/>Phân quyền</div><div className="info-tile yellow"><b className="text-slate-950">Proxy</b><br/>Node API</div></div>

            <h2 className="text-2xl font-extrabold mb-1">Đăng nhập</h2>
            <p className="text-sm text-slate-500 mb-5">Đăng nhập bằng tài khoản được cấp.</p>
            <label className="text-sm font-bold">Tài khoản</label>

            {page==='leader-reports' && canLeader && <LeaderReportApproval user={user}/>}

    function Dashboard({user, onNavigate}){
      const [summary,setSummary]=useState({received:0,workHours:0,people:0,overtime:0,currentLabel:'',months:[]});
      const [spm,setSpm]=useState({active:0,dqaTotal:0,byLevel:{L1:0,L2:0,L3:0},dqaDoing:0,dqaOk:0,dqaNg:0,fixedErrors:0,totalErrors:0,fmeaDone:0,fmeaTotal:0,fixRate:0,fmeaRate:0});
      const [loading,setLoading]=useState(true);
      const [spmLoading,setSpmLoading]=useState(true);
      const [error,setError]=useState('');
      useEffect(()=>{
        let alive = true;
        async function loadDashboard(){
          setLoading(true); setSpmLoading(true); setError('');
          try{
            const params = new URLSearchParams({
              reviewer: user?.username || '',
              role: user?.role || '',
              team: user?.team || '',
              group: groupForUser(user),
              _ts: Date.now()
            });
            const [dashboardResult, spmResult] = await Promise.allSettled([
              api(`/api/dashboard?${params.toString()}`),
              api(`/api/form10/spm-data?_ts=${Date.now()}`)
            ]);
            if (!alive) return;
            if (dashboardResult.status === 'fulfilled') setSummary(normalizeDashboardSummary(dashboardResult.value));
            else setError(dashboardResult.reason?.message || 'Không tải được dữ liệu tổng quan');
            if (spmResult.status === 'fulfilled') setSpm(normalizeSpmOverview(spmResult.value));
          }catch(ex){
            if (alive) setError(ex.message || 'Không tải được dữ liệu tổng quan');
          }finally{
            if (alive) { setLoading(false); setSpmLoading(false); }
          }
        }
        loadDashboard();
        return ()=>{ alive = false; };
      },[user?.username, user?.role, user?.team]);
      const chartRows = summary.months.length ? summary.months : fillDashboardMonths([], new Date().getFullYear());
      const latest = chartRows[chartRows.length - 1] || {};
      const previous = chartRows[chartRows.length - 2] || {};
      const deltaTasks = (Number(latest.tasks) || 0) - (Number(previous.tasks) || 0);
      const peak = chartRows.reduce((best,row)=>((Number(row.tasks)||0) > (Number(best.tasks)||0) ? row : best), chartRows[0] || {});
      const productivity = summary.people ? (summary.received / summary.people) : 0;
      const fmt = (n) => Number(n || 0).toLocaleString('vi-VN', { maximumFractionDigits: 1 });
      const deltaText = deltaTasks > 0 ? `tăng ${fmt(deltaTasks)} tác vụ so với tháng trước` : deltaTasks < 0 ? `giảm ${fmt(Math.abs(deltaTasks))} tác vụ so với tháng trước` : 'không đổi so với tháng trước';
      return <div className="grid gap-4">
        <section className="story-hero p-5 lg:p-6">
          <div className="grid lg:grid-cols-[1.15fr_.85fr] gap-5 items-end relative z-[1]">
            <div>
              <div className="story-kicker">Tổng quan vận hành DQA</div>
              <h2 className="text-3xl lg:text-4xl font-extrabold tracking-tight mt-2">Tháng {summary.currentLabel || 'hiện tại'} đã nhận <span className="text-sky-600">{loading ? '...' : fmt(summary.received)}</span> tác vụ.</h2>
              <p className="text-slate-600 mt-3 max-w-3xl">Khối lượng xử lý đang {loading ? 'được cập nhật' : deltaText}, với {loading ? '...' : fmt(summary.people)} nhân sự tham gia và {loading ? '...' : fmt(summary.workHours)} giờ công ghi nhận.</p>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div className="insight-card"><span>Hiệu suất/người</span><b>{loading ? '...' : fmt(productivity)}</b><p className="text-sm text-slate-500 mt-1">tác vụ mỗi nhân sự</p></div>
              <div className="insight-card"><span>Đỉnh chuỗi</span><b>{loading ? '...' : fmt(peak.tasks)}</b><p className="text-sm text-slate-500 mt-1">{peak.monthKey || 'chưa có dữ liệu'}</p></div>
            </div>
          </div>
        </section>
        <div className="overview-grid">
          <div className="card p-5">
            <div className="flex items-start justify-between gap-3 flex-wrap mb-3">
              <div>
                <h2 className="font-extrabold text-xl">Dashboard DQA</h2>
                <p className="text-sm text-slate-500 mt-1">Tác vụ, giờ công, nhân sự và tăng ca theo tháng.</p>
              </div>
              {error ? <span className="pill bg-red-50 text-red-700 border-red-200">{error}</span> : null}
            </div>
            <TrendChart rows={chartRows} loading={loading} metric="tasks"/>
          </div>
          <SpmOverviewPanel
            data={spm}
            loading={spmLoading}
            onOpenFull={onNavigate ? () => onNavigate(SPM_DASHBOARD.pageId) : null}
          />
        </div>
      </div>;
    }
    function SpmOverviewPanel({data, loading=false, onOpenFull}){
      const fmt = (n) => Number(n || 0).toLocaleString('vi-VN', { maximumFractionDigits: 1 });
      const pct = (v) => `${Math.round((Number(v) || 0) * 100)}%`;
      const donut = (ratio, color) => {
        const radius = 42;
        const circumference = 2 * Math.PI * radius;
        const safeRatio = Math.max(0, Math.min(1, Number(ratio) || 0));
        const dash = safeRatio * circumference;
        return { radius, circumference, dash, color };
      };
      const Donut = ({title, ratio, done, total, color}) => {
        const d = donut(ratio, color);
        return <div className="donut-card">
          <div className="donut-title">{title}</div>
          <svg className="donut-svg" viewBox="0 0 120 120" role="img" aria-label={`${title} ${pct(ratio)}`}>
            <circle cx="60" cy="60" r={d.radius} fill="none" stroke="#e7eff8" strokeWidth="14"/>
            <circle cx="60" cy="60" r={d.radius} fill="none" stroke={d.color} strokeWidth="14" strokeLinecap="round" strokeDasharray={`${d.dash} ${d.circumference - d.dash}`} transform="rotate(-90 60 60)"/>
            <text x="60" y="57" textAnchor="middle" fontSize="20" fontWeight="900" fill="#0f172a">{loading ? '...' : pct(ratio)}</text>
            <text x="60" y="76" textAnchor="middle" fontSize="10" fontWeight="700" fill="#64748b">hoàn thành</text>
          </svg>
          <div className="donut-value">{loading ? '...' : fmt(done)}</div>
          <div className="donut-note">{loading ? 'Đang tải...' : `${fmt(done)} / ${fmt(total)}`}</div>
        </div>;
      };
      return <div className="card p-5">
        <div className="mb-4 flex flex-wrap items-start justify-between gap-3">
          <div>
            <h2 className="font-extrabold text-xl">Dashboard SPM 2026</h2>
            <p className="text-sm text-slate-500 mt-1">Tổng hợp KRD triển khai và phần DQA tham gia trên cùng trang Tổng quan.</p>
          </div>
          {onOpenFull ? (
            <button type="button" className="btn btn-ghost text-sm shrink-0" onClick={onOpenFull}>
              Mở dashboard đầy đủ
            </button>
          ) : null}
        </div>
        <div className="grid grid-cols-2 gap-3 mb-3">
          <div className="insight-card"><span>KRD active</span><b>{loading ? '...' : fmt(data.active)}</b><p className="text-sm text-slate-500 mt-1">dự án đang triển khai</p></div>
          <div className="insight-card"><span>DQA tham gia</span><b className="text-violet-700">{loading ? '...' : fmt(data.dqaTotal)}</b><p className="text-sm text-slate-500 mt-1">dự án</p></div>
        </div>
        <div className="spm-mini-grid mb-4">
          {['L1','L2','L3'].map(level => <div className="spm-mini-card" key={level}><div className="label">Cấp {level}</div><div className="value">{loading ? '...' : fmt(data.byLevel?.[level])}</div></div>)}
        </div>
        <div className="table-wrap rounded-xl border border-[var(--line)] mb-4">
          <table className="data-table w-full">
            <thead><tr><th>Trạng thái DQA</th><th>Số dự án</th></tr></thead>
            <tbody>
              <tr><td>Đang đánh giá</td><td><b>{loading ? '...' : fmt(data.dqaDoing)}</b></td></tr>
              <tr><td>Kết quả OK</td><td><b className="text-emerald-700">{loading ? '...' : fmt(data.dqaOk)}</b></td></tr>
              <tr><td>Kết quả NG</td><td><b className="text-red-700">{loading ? '...' : fmt(data.dqaNg)}</b></td></tr>
            </tbody>
          </table>
        </div>
        <div className="donut-grid">
          <Donut title="Tỷ lệ cải tiến lỗi" ratio={data.fixRate} done={data.fixedErrors} total={data.totalErrors} color="#2563eb"/>
          <Donut title="Tỷ lệ bổ sung FMEA" ratio={data.fmeaRate} done={data.fmeaDone} total={data.fmeaTotal} color="#16a34a"/>
        </div>
      </div>;
    }
    function Stat({title,value,tone='blue',note='',active=false,onClick}){
      const cls = `card stat-card ${tone} p-4${active ? ' active' : ''}`;
      const inner = <>
        <div className="text-sm text-slate-500 font-bold">{title}</div>
        <div className="text-2xl font-extrabold mt-2">{value}</div>
        {note ? <div className="text-sm text-slate-500 mt-1">{note}</div> : null}
      </>;

    function OvertimeByPersonTable({defaultMonthKey=''}){
      const [items,setItems]=useState([]);
      const [loading,setLoading]=useState(true);
      const [error,setError]=useState('');
      const [month,setMonth]=useState(defaultMonthKey || 'all');
      const [q,setQ]=useState('');
      useEffect(()=>{
        let alive = true;
        (async ()=>{
          setLoading(true); setError('');
          try{
            const json = await api(`/api/overtime-by-person?_ts=${Date.now()}`);
            if (alive) setItems(normalizeOvertimeByPerson(json));
          }catch(ex){
            if (alive) setError(ex.message || 'Không tải được bảng giờ tăng ca');
          }finally{
            if (alive) setLoading(false);
          }
        })();
        return ()=>{ alive = false; };
      },[]);
      useEffect(()=>{
        if (defaultMonthKey) setMonth(defaultMonthKey);
      },[defaultMonthKey]);
      const fmt = (n) => Number(n).toLocaleString('vi-VN', { maximumFractionDigits: 1 });
      const months = useMemo(()=>{
        const keys = [...new Set(items.map(r => r.monthKey))].sort();
        return keys.map(k => ({ value: k, label: `${k} (${monthLabelFromKey(k)})` }));
      },[items]);
      const filtered = useMemo(()=>{
        const query = norm(q);
        return items.filter(row => {
          const okM = month === 'all' || row.monthKey === month;
          const okQ = !query || norm(row.name).includes(query);
          return okM && okQ;
        });
      },[items, month, q]);
      const totalHours = useMemo(()=>filtered.reduce((s,r)=>s+(Number(r.hours)||0),0),[filtered]);
      return (
        <div className="space-y-3">
          <div className="flex flex-wrap items-end gap-3">
            <div>
              <div className="text-xs font-bold text-slate-500 mb-1">Lọc tháng</div>
              <select className="field min-w-[200px]" value={month} onChange={e=>setMonth(e.target.value)} disabled={loading}>
                <option value="all">Tất cả tháng</option>
                {months.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
              </select>
            </div>
            <div className="flex-1 min-w-[200px]">
              <div className="text-xs font-bold text-slate-500 mb-1">Tìm nhân sự</div>
              <input className="field w-full" placeholder="Nhập tên..." value={q} onChange={e=>setQ(e.target.value)} disabled={loading}/>
            </div>
            <div className="text-sm text-slate-600 pb-2 ml-auto">
              {loading ? 'Đang tải...' : <>Hiển thị <b>{filtered.length}</b> dòng · Tổng <b className="text-red-700">{fmt(totalHours)}</b> giờ</>}
            </div>
          </div>
          {error ? <div className="pill bg-red-50 text-red-700 border-red-200 inline-block">{error}</div> : null}
          <div className="table-wrap rounded-xl border border-[var(--line)] max-h-[420px] overflow-auto">
            <table className="data-table w-full">
              <thead className="sticky top-0 bg-white z-[1]">
                <tr>
                  <th className="w-12">#</th>
                  <th>Tháng</th>
                  <th>Nhân sự</th>
                  <th>Onboard</th>
                  <th className="text-right">Số giờ tăng ca</th>
                </tr>
              </thead>
              <tbody>
                {loading ? <tr><td colSpan="5" className="text-center text-slate-500 py-8">Đang tải dữ liệu...</td></tr>
                : !filtered.length ? <tr><td colSpan="5" className="text-center text-slate-500 py-8">Không có dữ liệu phù hợp.</td></tr>
                : filtered.map((row, idx) => <tr key={`${row.monthKey}-${row.name}`}>
                  <td className="text-slate-500">{idx + 1}</td>
                  <td><b>{row.monthKey}</b> <span className="text-slate-500">({row.label})</span></td>
                  <td>{row.name}</td>
                  <td><OnboardBadge value={row.onboard}/></td>
                  <td className={`text-right font-bold ${row.hours > 0 ? 'text-red-700' : 'text-slate-400'}`}>{fmt(row.hours)}</td>
                </tr>)}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function ComboWorkloadChartSvg({rows, loading, fmt}){
      const w = 720, h = 300, padL = 58, padR = 64, padT = 52, padB = 44;
      const chartW = w - padL - padR, chartH = h - padT - padB;
      const n = Math.max(1, rows.length);
      const slotW = chartW / n;
      const barW = Math.min(46, slotW * 0.42);
      const maxTasks = yDomainHeadroom(Math.max(1, ...rows.map(r => Number(r.tasks) || 0)));
      const maxHours = yDomainHeadroom(Math.max(1, ...rows.map(r => Number(r.workHours) || 0)));
      const xAt = (i) => padL + i * slotW + slotW / 2;
      const yTask = (v) => padT + chartH - (v / maxTasks) * chartH;
      const yBase = padT + chartH;
      const linePts = rows.map((r, i) => `${xAt(i)},${yTask(Number(r.tasks) || 0)}`).join(' ');
      return (
        <div className="overflow-x-auto">
          <svg viewBox={`0 0 ${w} ${h}`} className="min-w-[680px] w-full" style={{height: h}} role="img" aria-label="Số tác vụ và giờ công theo tháng">
            <defs>
              <pattern id="otHatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="8" stroke="#ef4444" strokeWidth="3" opacity="0.9"/>
              </pattern>
            </defs>
            {[0,.25,.5,.75,1].map((t, i) => {
              const y = padT + chartH - t * chartH;
              return <g key={i}>
                <line x1={padL} y1={y} x2={w - padR} y2={y} stroke="#e2e8f0" strokeWidth="1"/>
                <text x={padL - 8} y={y + 4} fill="#64748b" fontSize="10" textAnchor="end">{fmt(Math.round(maxTasks * t))}</text>
                <text x={w - padR + 8} y={y + 4} fill="#64748b" fontSize="10" textAnchor="start">{fmt(Math.round(maxHours * t))}</text>
              </g>;
            })}
            <line x1={padL} y1={yBase} x2={w - padR} y2={yBase} stroke="#94a3b8" strokeWidth="1.5"/>
            <text x={14} y={padT + chartH / 2} fill="#2563eb" fontSize="11" fontWeight="700" transform={`rotate(-90 14 ${padT + chartH / 2})`} textAnchor="middle">Số tác vụ</text>
            <text x={w - 12} y={padT + chartH / 2} fill="#0d9488" fontSize="11" fontWeight="700" transform={`rotate(90 ${w - 12} ${padT + chartH / 2})`} textAnchor="middle">Số giờ công</text>
            {rows.map((row, i) => {
              const total = Number(row.workHours) || 0;
              const ot = Math.min(Number(row.overtime) || 0, total);
              const reg = Math.max(0, total - ot);
              const cx = xAt(i);
              const bx = cx - barW / 2;
              const hTotal = (total / maxHours) * chartH;
              const hOt = (ot / maxHours) * chartH;
              const hReg = hTotal - hOt;
              const yTop = yBase - hTotal;
              return <g key={`bar-${row.monthKey || i}`} opacity={loading ? 0.4 : 1}>
                <rect x={bx} y={yBase - hReg} width={barW} height={Math.max(0, hReg)} rx="4" fill="#7dd3fc"/>
                {hOt > 0 ? <rect x={bx} y={yTop} width={barW} height={hOt} rx="4" fill="url(#otHatch)" stroke="#ef4444" strokeWidth="1"/> : null}
                {total > 0 ? <text x={cx} y={yTop - 8} fill="#0f766e" fontSize="10" fontWeight="700" textAnchor="middle">{fmt(total)}</text> : null}
              </g>;
            })}
            <polyline points={linePts} fill="none" stroke="#2563eb" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
            {rows.map((row, i) => {
              const tasks = Number(row.tasks) || 0;
              const cx = xAt(i);
              return <g key={`line-${row.monthKey || i}`} opacity={loading ? 0.4 : 1}>
                <circle cx={cx} cy={yTask(tasks)} r="6" fill="#fff" stroke="#2563eb" strokeWidth="3"/>
                <text x={cx} y={yTask(tasks) + 22} fill="#1e40af" fontSize="11" fontWeight="800" textAnchor="middle">{fmt(tasks)}</text>
              </g>;
            })}
            {rows.map((row, i) => <text key={`x-${row.monthKey}`} x={xAt(i)} y={h - 10} fill="#64748b" fontSize="12" fontWeight="700" textAnchor="middle">{row.label}</text>)}
          </svg>
        </div>
      );
    }

    function Filters({filters,setFilters, statuses=['Pending1','Pending2','Approved','ChangesRequested','TestBen','All'], group=false, groupOptions}){
      const opts = groupOptions || [{value:'all',label:'Tất cả nhóm'},{value:'linh',label:'Nhóm Linh'},{value:'hieu',label:'Nhóm Hiếu'}];
      return <div className="filter-bar">
        <div className="filter-item filter-search">
          <label className="field-label">Tìm kiếm</label>
          <input className="field w-full" placeholder="Mã, tiêu đề, người lập..." value={filters.q} onChange={e=>setFilters({...filters,q:e.target.value})}/>
        </div>
        <div className="filter-item">
          <label className="field-label">Trạng thái</label>
          <select className="field w-full" value={filters.status} onChange={e=>setFilters({...filters,status:e.target.value})}>{statuses.map(s=><option key={s} value={s}>{s==='All'?'Tất cả':statusLabel(s)}</option>)}</select>
        </div>
        <div className="filter-item">
          <label className="field-label">Từ ngày</label>
          <input className="field w-full" type="date" value={filters.from} onChange={e=>setFilters({...filters,from:e.target.value})}/>
        </div>
        <div className="filter-item">
          <label className="field-label">Đến ngày</label>
          <input className="field w-full" type="date" value={filters.to} onChange={e=>setFilters({...filters,to:e.target.value})}/>
        </div>
        {group ? <div className="filter-item">
          <label className="field-label">Nhóm</label>
          <select className="field w-full" value={filters.group} disabled={opts.length === 1} onChange={e=>setFilters({...filters,group:e.target.value})}>{opts.map(opt=><option key={opt.value} value={opt.value}>{opt.label}</option>)}</select>
        </div> : null}
      </div>;
    }
    function filterReports(items, filters, group=false, groupAssignments){
      return items.filter(it=>{
        const q = norm(filters.q);
        const okQ = !q || norm([it.code,it.title,it.reporter,it.conclusion,it.note,it.leaderNote,it.picNote].join(' ')).includes(q);
        const okS = filters.status === 'All' || it.status === filters.status;
        const d = parseDate(it.submitDate);
        const from = parseDate(filters.from), to = parseDate(filters.to);
        const okFrom = !from || !d || d >= new Date(from.getFullYear(), from.getMonth(), from.getDate());
        const okTo = !to || !d || d <= new Date(to.getFullYear(), to.getMonth(), to.getDate(), 23,59,59,999);
        const okG = !group || isInGroup(it.reporter, filters.group, groupAssignments);
        return okQ && okS && okFrom && okTo && okG;
      });
    }

    function QuickApproval({user, canLeader, canManager, mode='general'}){
      const isNctnMode = mode === 'nctn';
      const isLeaderMode = mode === 'leader';
      const isManagerMode = mode === 'manager';
      const sources = useMemo(() => [
        ...(isLeaderMode && canLeader ? [{
          key:'leader', label:'Trưởng nhóm', listUrl:'/api/reports', actionUrl:'/api/report-action',
          status:'Pending2', normalize:normalizeLeaderReport, group:groupForUser(user),
          canAct:(it)=>it.status === 'Pending2'
        }] : []),
        ...(isManagerMode && canManager ? [{
          key:'manager-dqa', label:'DQA', listUrl:'/api/tp/reports', actionUrl:'/api/tp/report-action',
          status:'Pending', normalize:(r)=>normalizeManagerReport(r,'DQA'), canAct:(it)=>['Pending','Pending1'].includes(it.status)
        }] : []),
        ...(isNctnMode && canManager ? [{
          key:'manager-nctn', label:'NCTN', listUrl:'/api/tp/nctn-reports', actionUrl:'/api/tp/nctn-action',
          status:'Pending1', normalize:(r)=>normalizeManagerReport(r,'NCTN'), canAct:(it)=>['Pending','Pending1'].includes(it.status)
        }] : [])
      ], [canLeader, canManager, isLeaderMode, isManagerMode, isNctnMode, user?.username, user?.role, user?.team]);
      const [items,setItems]=useState([]);
      const [loading,setLoading]=useState(false);
      const [toast,setToast]=useState([]);
      const [modal,setModal]=useState({open:false, action:'', targets:[], comment:'', reason:''});
      const [preview,setPreview]=useState({open:false, title:'', url:'', originalUrl:''});
      function pushToast(title, detail=''){
        const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        setToast(cur => [{id,title,detail}, ...cur].slice(0, 4));
        setTimeout(()=>setToast(cur => cur.filter(x => x.id !== id)), 3500);
      }
      function sourceUrl(source){
        const url = new URL(source.listUrl, window.location.origin);
        url.searchParams.set('action', 'reports_query');
        url.searchParams.set('status', source.status);
        url.searchParams.set('statusLabel', statusLabel(source.status));
        url.searchParams.set('reviewer', user?.username || '');
        url.searchParams.set('role', user?.role || '');
        url.searchParams.set('team', user?.team || '');
        if (source.group) url.searchParams.set('group', source.group);
        url.searchParams.set('_ts', Date.now());
        return `${url.pathname}${url.search}`;
      }
      async function load(){
        setLoading(true);
        try{
          let assignments = null;
          if (sources.some(s => s.key === 'leader')){
            const params = new URLSearchParams({reviewer:user?.username || '', role:user?.role || '', team:user?.team || '', _ts:Date.now()});
            assignments = normalizeGroupAssignments(await api(`/api/groups?${params.toString()}`));
          }
          const loaded = await Promise.all(sources.map(async source => {
            const json = await api(sourceUrl(source));
            let rows = deepRows(json).map(source.normalize).filter(x => (x.id || x.code || x.title) && source.canAct(x));
            if (source.key === 'leader' && assignments) rows = filterReports(rows, {q:'',status:source.status,from:'',to:'',group:source.group || 'all'}, true, assignments);
            return rows.map(row => ({...row, quickSource:source}));
          }));
          setItems(loaded.flat().sort((a,b)=>{
            const da = parseDate(a.submitDate), db = parseDate(b.submitDate);
            return (db ? db.getTime() : 0) - (da ? da.getTime() : 0);
          }));
        }catch(ex){ pushToast('Tải dữ liệu thất bại', ex.message || String(ex)); }
        finally{ setLoading(false); }
      }
      useEffect(()=>{ load(); },[sources]);
      function openAction(action, targets){
        const list = Array.isArray(targets) ? targets : [targets];
        setModal({open:true, action, targets:list.filter(Boolean), comment:'', reason:''});
      }
      async function submitAction(){
        const {action, targets, comment, reason} = modal;
        if (!targets?.length) return;
        if (action === 'report_reject' && !String(reason || '').trim()){ pushToast('Thiếu lý do', 'Bạn cần nhập lý do từ chối.'); return; }
        setLoading(true);
        try{
          for (let i = 0; i < targets.length; i++){
            const item = targets[i];
            await postForm(item.quickSource.actionUrl, {
              action, id:item.id, reviewer:user?.username || '',
              comment: action === 'report_reject' ? '' : (comment || ''),
              reason: action === 'report_reject' ? (reason || '') : '',
              qa_code:`QA.RV.${Date.now()}.${i+1}`,
              submitDate:item.submitDate || '',
              sentDate:nowMinute(),
              ma_tac_vu:item.code || '',
              tieu_de:item.title || '',
              ma_bao_cao:item.conclusion || '',
              _ts:Date.now()
            });
          }
          pushToast('Đã gửi thao tác', 'Bản ghi đã được gửi lên hệ thống.');
          setModal({open:false, action:'', targets:[], comment:'', reason:''});
          load();
        }catch(ex){ pushToast('Gửi thất bại', ex.message || String(ex)); }
        finally{ setLoading(false); }
      }
      const bySource = sources.map(source => ({...source, count:items.filter(it => it.quickSource?.key === source.key).length}));
      return <div className="approval-card">
        <div className="approval-header">
          <div className="flex items-start justify-between gap-4 flex-wrap">
            <div>
              <h2 className="font-extrabold text-slate-950">{isNctnMode ? 'Duyệt nhanh báo cáo NCTN' : isManagerMode ? 'Duyệt nhanh báo cáo DQA' : 'Duyệt nhanh báo cáo Trưởng nhóm'}</h2>
              <p className="approval-subtitle">{isNctnMode ? 'Luồng NCTN được tách riêng để xử lý logic đặc thù.' : isManagerMode ? 'Luồng Trưởng phòng DQA, chỉ xử lý báo cáo đang chờ phê duyệt.' : 'Luồng Trưởng nhóm, chỉ xử lý báo cáo Trưởng nhóm Review.'}</p>
            </div>
            <div className="metric-row">
              <div className="metric-chip"><div className="label">Cần xử lý</div><div className="value">{items.length}</div></div>
              {bySource.map(s => <div className="metric-chip" key={s.key}><div className="label">{s.label}</div><div className="value">{s.count}</div></div>)}
            </div>
          </div>
        </div>
        <div className="quick-topbar">
          <div className="text-sm text-slate-600 font-bold">{loading ? 'Đang tải danh sách...' : `Có ${items.length} báo cáo có thể thao tác nhanh`}</div>
          <div className="flex gap-2 flex-wrap items-center">
            <button type="button" className="btn btn-ghost min-w-[124px]" onClick={()=>openAction('report_approve', items)} disabled={loading || !items.length}>Duyệt tất cả</button>
            <button type="button" className="btn btn-primary min-w-[108px]" onClick={load} disabled={loading}>{loading ? <span className="spinner"></span> : 'Tải lại'}</button>
          </div>
        </div>
        <div className="p-4 lg:p-5">
          {items.length ? <div className="quick-grid">
            {items.map((it,idx)=><div className="quick-card" key={`${it.quickSource?.key}-${it.id || it.code || idx}`}>
              <div className="quick-card-head">
                <div className="min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-2">
                    <span className="pill bg-sky-50 text-sky-700 border-sky-200">{it.quickSource?.label}</span>
                    {statusBadge(it.status)}
                  </div>
                  <div className="quick-card-title">{escapeText(it.title) || '-'}</div>
                </div>
              </div>
              <div>{it.reportUrl ? <button type="button" className="code-link text-left" onClick={()=>setPreview({open:true,title:it.code || it.id || 'Báo cáo',url:reportPreviewUrl(it.reportUrl),originalUrl:it.reportUrl,downloadUrl:reportDownloadUrl(it.reportUrl)})}>{it.code || it.id}</button> : <span className="code-link">{it.code || it.id}</span>}</div>
              <div className="quick-meta">
                <div><span>Người lập</span><b>{escapeText(it.reporter) || '-'}</b></div>
                <div><span>Ngày nộp</span><b>{fmtDate(it.submitDate) || '-'}</b></div>
                <div><span>Hạn</span><b>{fmtDate(it.wishDate) || '-'}</b></div>
                <div><span>Kết luận</span><b>{escapeText(it.conclusion) || '-'}</b></div>
                <div><span>Nhận xét trưởng nhóm</span><b>{escapeText(it.leaderNote) || '-'}</b></div>
                <div><span>Ghi chú</span><b>{escapeText(formatReportNote(it)) || '-'}</b></div>
              </div>
              <div className="quick-actions">
                <button type="button" className="btn btn-primary" onClick={()=>openAction('report_approve', it)} disabled={loading}>Duyệt</button>
                <button type="button" className="btn btn-danger" onClick={()=>openAction('report_reject', it)} disabled={loading}>Từ chối</button>
                <button type="button" className="btn btn-amber" onClick={()=>openAction('report_request_changes', it)} disabled={loading}>Bổ sung</button>
              </div>
            </div>)}
          </div> : <div className="empty-state"><b>Không có báo cáo cần duyệt nhanh</b>{loading ? 'Đang tải dữ liệu.' : 'Các mục hiện tại vẫn giữ nguyên ở màn hình Báo cáo.'}</div>}
        </div>
        <ToastHost items={toast} onDismiss={(id)=>setToast(cur=>cur.filter(x=>x.id!==id))}/>
        <Modal
          open={modal.open}
          title={modal.action==='report_approve' ? 'Xác nhận duyệt nhanh' : modal.action==='report_request_changes' ? 'Yêu cầu bổ sung' : 'Từ chối báo cáo'}
          onClose={()=>setModal({open:false, action:'', targets:[], comment:'', reason:''})}
          footer={<><button className="btn btn-ghost" onClick={()=>setModal({open:false, action:'', targets:[], comment:'', reason:''})}>Hủy</button><button className="btn btn-primary" onClick={submitAction} disabled={loading}>{loading ? <span className="spinner"></span> : 'Gửi'}</button></>}
        >
          <div className="text-sm text-slate-600 mb-4">{modal.targets[0]?.title || 'Báo cáo'} · {modal.targets[0]?.code || modal.targets[0]?.id || ''}</div>
          {modal.action === 'report_reject' ? (
            <><label className="text-sm font-extrabold">Lý do từ chối</label><textarea className="field w-full mt-1" rows="4" value={modal.reason} onChange={e=>setModal(m=>({...m, reason:e.target.value}))} placeholder="Nhập lý do (bắt buộc)"></textarea></>
          ) : (
            <><label className="text-sm font-extrabold">Bình luận</label><textarea className="field w-full mt-1" rows="4" value={modal.comment} onChange={e=>setModal(m=>({...m, comment:e.target.value}))} placeholder="Nhập bình luận (không bắt buộc)"></textarea></>
          )}
        </Modal>
        <Modal
          open={preview.open}
          title="Xem báo cáo"
          onClose={()=>setPreview({open:false, title:'', url:'', originalUrl:''})}
          footer={<><a className="btn btn-ghost" href={preview.originalUrl || preview.url} target="_blank" rel="noreferrer">Mở tab mới</a><a className="btn btn-amber" href={preview.downloadUrl || preview.originalUrl || preview.url} target="_blank" rel="noreferrer">Tải xuống</a><button className="btn btn-primary" onClick={()=>setPreview({open:false, title:'', url:'', originalUrl:''})}>Xong</button></>}
        >
          {preview.url ? <iframe className="preview-frame" src={preview.url} title={preview.title || 'Xem báo cáo'}></iframe> : <div className="empty-state"><b>Không có link báo cáo</b></div>}
        </Modal>
      </div>;
    }

    function QuickFormApproval({user}){
      const listUrl = '/api/pdforms';
      const actionUrl = '/api/pdform-action';

      const [items,setItems]=useState([]);
      const [loading,setLoading]=useState(false);
      const [toast,setToast]=useState([]);
      const [modal,setModal]=useState({open:false, action:'', targets:[], comment:'', reason:''});
      const lockedGroup = user?.role === 'Trưởng nhóm' ? groupForUser(user) : 'all';
      const [group,setGroup]=useState(lockedGroup);
      const [groupAssignments,setGroupAssignments]=useState(null);
      const groupOptions = useMemo(() => groupOptionsFromAssignments(groupAssignments, lockedGroup), [groupAssignments, lockedGroup]);
      const rows = useMemo(() => items
        .filter(it => it.type !== 'form5_subtask_auto_c')
        .filter(it => norm(it.status) === norm(approveStatus))

      function pushToast(title, detail=''){

        setTimeout(()=>setToast(cur => cur.filter(x => x.id !== id)), 3500);

      function openAction(action, targets){

      }
      async function submitAction(){
        const {action, targets, comment, reason} = modal;
        if (!targets?.length) return;
        const isReject = action === 'pdform_reject';
        if (isReject && !String(reason || '').trim()){ pushToast('Thiếu lý do', 'Bạn cần nhập lý do từ chối.'); return; }

        try{
          for (let i = 0; i < targets.length; i++){

              action,
              id:item.id,
              reviewer:user?.username || '',
              comment: action === 'pdform_approve' ? (comment || '') : '',
              reason: isReject ? (reason || '') : '',
              Leaderformactiontime: nowMinute(),
              Managerformactiontime: nowMinute(),
              _ts:Date.now()
            };
            Object.entries(item.raw || {}).forEach(([k,v]) => {
              if (!(k in payload) && k.toLowerCase() !== 'taskdata') payload[k] = typeof v === 'object' ? JSON.stringify(v) : String(v ?? '');
            });
            await postForm(actionUrl, payload);
          }
          pushToast('Đã gửi thao tác', `${targets.length} form đã được gửi lên hệ thống.`);
          setModal({open:false, action:'', targets:[], comment:'', reason:''});
          load();
        }catch(ex){ pushToast('Gửi thất bại', ex.message || String(ex)); }
        finally{ setLoading(false); }
      }
      return <div className="approval-card">
        <div className="approval-header">
          <div className="flex items-start justify-between gap-4 flex-wrap">
            <div>
              <h2 className="font-extrabold text-slate-950">Duyệt nhanh form</h2>

              <div className="metric-chip"><div className="label">Cần xử lý</div><div className="value">{rows.length}</div></div>

    function ReportApproval({user,role,title,listUrl,actionUrl,normalize,statuses,groupFilter=false,defaultStatus}){
      const [items,setItems]=useState([]);
      const lockedGroup = groupFilter && user?.role === 'Trưởng nhóm' ? groupForUser(user) : 'all';

        url.searchParams.set('statusLabel', statusLabel(filters.status));

        url.searchParams.set('team', user?.team || '');

        if (filters.from) url.searchParams.set('from', filters.from);
        if (filters.to) url.searchParams.set('to', filters.to);

        url.searchParams.set('_ts', Date.now());
        return `${url.pathname}${url.search}`;
      }
      async function loadGroups(){
        const params = new URLSearchParams({
          reviewer: user?.username || '',
          role: user?.role || '',
          team: user?.team || '',

          const json = await api(reportListRequestUrl());

            .map(normalize)
            .filter(x=>x.id || x.code || x.title)

              const da = parseDate(a.submitDate);
              const db = parseDate(b.submitDate);
              return (db ? db.getTime() : 0) - (da ? da.getTime() : 0);
            });
          setItems(normalized);

        finally{ setLoading(false); }

        if (!loading){
          const t = setTimeout(()=>setShowSkel(false), 260);
          return ()=>clearTimeout(t);
        }

          setLoading(false);

                <button className="btn btn-sm btn-amber" onClick={()=>openAction('report_request_changes', selectedItems)} disabled={loading}>Bổ sung</button>
                <button className="btn btn-sm btn-danger" onClick={()=>openAction('report_reject', selectedItems)} disabled={loading}>Từ chối</button>
                <button className="btn btn-sm btn-ghost" onClick={()=>setSelected(new Set())} disabled={loading}>Bỏ chọn</button>
              </div>
            ) : <span className="bulk-hint">Chọn nhiều dòng để thao tác hàng loạt</span>}
            <div className="toolbar-actions-right">
              {isManagerReport ? <button type="button" className="btn btn-ghost min-w-[136px]" onClick={()=>openAction('report_approve', pendingApprovalItems)} disabled={loading || !pendingApprovalItems.length}>Phê duyệt tất cả</button> : null}
              <button type="button" className="btn btn-primary min-w-[108px]" onClick={() => load({ reloadGroups: true })} disabled={loading}>{loading ? <span className="spinner"></span> : 'Tải lại'}</button>
            </div>
          </div>
        </div>
        {message ? <div className="message-banner">{message}</div> : null}
        <div className="table-meta">
          <span>Hiển thị <strong>{rows.length}</strong> / {items.length} bản ghi</span>
          {groupFilter && groupAssignments ? <span>Nhóm: <strong>{groupOptions.find(o => o.value === filters.group)?.label || filters.group}</strong></span> : null}
        </div>
        <div className="relative">
          <TableSkeleton kind="report" rows={8} visible={showSkel} transitionMs={260}/>
          <div style={{opacity: showSkel ? 0 : 1, transition:'opacity 200ms ease-out'}} aria-hidden={showSkel}>
            <div className="table-wrap">
          <table className="data-table report-table min-w-[1080px]">

              <col className="col-action" />
              <col className="col-code" />
              <col className="col-title" />
              <col className="col-person" />
              <col className="col-date" />
              <col className="col-date" />

              <col className="col-note" />

            </tr>) : <tr><td className="empty-state" colSpan="10"><b>Không có bản ghi phù hợp</b>Thử đổi bộ lọc hoặc bấm tải lại dữ liệu.</td></tr>}</tbody>
          </table>
            </div>
          </div>
        </div>
        <ToastHost items={toast} onDismiss={(id)=>setToast(cur=>cur.filter(x=>x.id!==id))}/>
        <Modal
          open={modal.open}
          title={modal.action==='report_approve' ? 'Xác nhận duyệt' : modal.action==='report_request_changes' ? 'Yêu cầu bổ sung' : 'Từ chối báo cáo'}
          onClose={()=>setModal({open:false, action:'', targets:[], comment:'', reason:''})}
          footer={
            <>

              <button className="btn btn-primary" onClick={submitAction} disabled={loading}>{loading ? <span className="spinner"></span> : 'Gửi'}</button>
            </>
          }
        >
          <div className="text-sm text-slate-600 mb-4">
            Đang thao tác trên <b>{modal.targets.length}</b> bản ghi.
          </div>
          {modal.action === 'report_reject' ? (
            <>
              <label className="text-sm font-extrabold">Lý do từ chối</label>
              <textarea className="field w-full mt-1" rows="4" value={modal.reason} onChange={e=>setModal(m=>({...m, reason:e.target.value}))} placeholder="Nhập lý do (bắt buộc)"></textarea>

              <div className="text-xs text-slate-500 truncate">{preview.url}</div>

        </Modal>
      </div>;

              comment: action === 'pdform_approve' ? (comment || '') : '',
              reason: isReject ? (reason || '') : '',
              Leaderformactiontime: nowMinute(),
              Managerformactiontime: nowMinute(),
              _ts:Date.now()
            };
            // Preserve upstream fields to keep webhook compatibility.
            Object.entries(item.raw || {}).forEach(([k,v]) => {
              if (!(k in payload) && k.toLowerCase() !== 'taskdata') payload[k] = typeof v === 'object' ? JSON.stringify(v) : String(v ?? '');
            });
            await postForm(actionUrl, payload);
          }
          pushToast('Đã gửi thao tác', `${targets.length} form đã được gửi lên hệ thống.`);
          setModal({open:false, action:'', targets:[], comment:'', reason:''});
          load();
        }catch(ex){
          pushToast('Gửi thất bại', ex.message || String(ex));
        }finally{
          setLoading(false);
        }
      }
      const visibleItems = items
        .filter(it => it.type !== 'form5_subtask_auto_c')
        .filter(it => groupAssignments ? isInGroup(it.pic, group, groupAssignments) : false);
      const waiting = countBy(visibleItems, it => norm(it.status) === norm(approveStatus));
      const approved = countBy(visibleItems, it => norm(it.status).includes('duyet') || norm(it.status).includes('approved'));
      return <div className="approval-card">
        <div className="approval-header">
          <div className="flex items-start justify-between gap-4 flex-wrap">
            <div>
              <h2 className="text-2xl font-extrabold text-slate-950">Phê duyệt form</h2>
            </div>
            <div className="flex gap-2 flex-wrap">
              <div className="metric-chip"><div className="label">Đúng trạng thái</div><div className="value">{waiting}</div></div>
              <div className="metric-chip"><div className="label">Đã duyệt</div><div className="value">{approved}</div></div>
            </div>
          </div>
        </div>
        <div className="approval-toolbar">
          <div className="flex gap-2 flex-wrap">
            <select className="field max-w-[240px]" value={status} onChange={e=>setStatus(e.target.value)}><option value="All">Tất cả</option><option value="Leader review">Leader review</option><option value="Chờ TP phê duyệt">Chờ TP phê duyệt</option><option value="Được duyệt">Được duyệt</option></select>
            <select className="field max-w-[220px]" value={group} disabled={groupOptions.length === 1} onChange={e=>setGroup(e.target.value)}>{groupOptions.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}</select>
          </div>
          <div className="flex gap-2 flex-wrap justify-end items-center">
            {selectedCount > 0 ? (
              <div className="flex gap-2 flex-wrap items-center">
                <span className="text-sm text-slate-600 font-bold">Đã chọn: {selectedCount}</span>
                <button className="btn btn-sm btn-primary" onClick={()=>openAction('pdform_approve', selectedItems)} disabled={loading}>Duyệt</button>
                <button className="btn btn-sm btn-danger" onClick={()=>openAction('pdform_reject', selectedItems)} disabled={loading}>Từ chối</button>
                <button className="btn btn-sm btn-ghost" onClick={()=>setSelected(new Set())} disabled={loading}>Bỏ chọn</button>
              </div>
            ) : null}
            <button className="btn btn-primary min-w-[92px]" onClick={() => load({ reloadGroups: true })}>{loading ? <span className="spinner"></span> : 'Tải lại'}</button>
          </div>
        </div>
        <div className="table-meta">
          <span>Hiển thị <strong>{rows.length}</strong> / {visibleItems.length} form</span>
          {groupAssignments ? <span>Nhóm: <strong>{groupOptions.find(o => o.value === group)?.label || group}</strong></span> : null}
        </div>
        <div className="relative">
          <TableSkeleton kind="form" rows={8} visible={showSkel} transitionMs={260}/>
          <div style={{opacity: showSkel ? 0 : 1, transition:'opacity 200ms ease-out'}} aria-hidden={showSkel}>
            <div className="table-wrap">
          <table className="data-table min-w-[1120px]">
            <thead><tr>
              <th className="w-[44px]"><input type="checkbox" checked={rows.length>0 && selected.size===rows.length} onChange={toggleAll} aria-label="Chọn tất cả"/></th>
              <th>Hành động</th><th>Form</th><th>Tên tác vụ</th><th>Mã</th><th>Mã tác vụ</th><th>PIC</th><th>Thời gian gửi</th><th>Trạng thái</th>
            </tr></thead>
            <tbody>{rows.length ? rows.map((it,idx)=><tr key={`${it.id}-${idx}`} className="border-t">
              <td><input type="checkbox" checked={selected.has(rowKey(it,idx))} onChange={()=>toggleOne(it,idx)} aria-label="Chọn form"/></td>
              <td><div className="action-stack">
                <button className="btn btn-sm btn-primary" onClick={()=>openAction('pdform_approve',[it])} disabled={loading}>Duyệt</button>
                <button className="btn btn-sm btn-danger" onClick={()=>openAction('pdform_reject',[it])} disabled={loading}>Từ chối</button>
              </div></td>
              <td>{it.formLink ? <a className="code-link" href={/^https?:\/\//.test(it.formLink)?it.formLink:`https://${it.formLink}`} target="_blank" rel="noreferrer">Xem form</a> : '-'}</td>
              <td><div className="two-line max-w-[340px]"><b className="truncate">{escapeText(it.taskName) || '-'}</b><span className="truncate">{escapeText(it.subtaskCode)}</span></div></td>
              <td>{escapeText(it.taskCode) || '-'}</td>
              <td><span className="code-link">{escapeText(it.subtaskCode) || '-'}</span></td>
              <td>{escapeText(it.pic) || '-'}</td>
              <td>{fmtDate(it.sentTime) || it.sentTime || '-'}</td>
              <td><span className="pill bg-slate-50 text-slate-700 border-slate-200">{escapeText(it.status) || '-'}</span></td>
            </tr>) : <tr><td className="empty-state" colSpan="9"><b>Không có form phù hợp</b>Thử đổi bộ lọc hoặc tải lại danh sách.</td></tr>}</tbody>
          </table>
            </div>
          </div>
        </div>
        <ToastHost items={toast} onDismiss={(id)=>setToast(cur=>cur.filter(x=>x.id!==id))}/>
        <Modal
          open={modal.open}
          title={modal.action==='pdform_approve' ? 'Xác nhận duyệt form' : 'Từ chối form'}
          onClose={()=>setModal({open:false, action:'', targets:[], comment:'', reason:''})}
          footer={
            <>
              <button className="btn btn-ghost" onClick={()=>setModal({open:false, action:'', targets:[], comment:'', reason:''})}>Hủy</button>
              <button className="btn btn-primary" onClick={submitAction} disabled={loading}>{loading ? <span className="spinner"></span> : 'Gửi'}</button>
            </>
          }
        >
          <div className="text-sm text-slate-600 mb-4">
            Đang thao tác trên <b>{modal.targets.length}</b> form.
          </div>
          {modal.action === 'pdform_reject' ? (
            <>
              <label className="text-sm font-extrabold">Lý do từ chối</label>
              <textarea className="field w-full mt-1" rows="4" value={modal.reason} onChange={e=>setModal(m=>({...m, reason:e.target.value}))} placeholder="Nhập lý do (bắt buộc)"></textarea>
            </>
          ) : (
            <>
              <label className="text-sm font-extrabold">Bình luận</label>
              <textarea className="field w-full mt-1" rows="4" value={modal.comment} onChange={e=>setModal(m=>({...m, comment:e.target.value}))} placeholder="Nhập bình luận (không bắt buộc)"></textarea>
              <div className="text-xs text-slate-500 mt-2">Ghi chú: hệ thống chỉ gửi bình luận khi Duyệt (tương thích webhook hiện tại).</div>
            </>
          )}
        </Modal>
      </div>;
    }

    function Users(){
      const users = [
        ['admin','Quản trị hệ thống','Admin','Toàn hệ thống'],
        ['truongphong','Trưởng phòng DQA','Trưởng phòng','Khối trưởng phòng'],
        ['linh','Nguyễn Văn Linh','Trưởng nhóm','Nhóm Linh'],
        ['hieu','Nguyễn Văn Hiếu','Trưởng nhóm','Nhóm Hiếu']
      ];
      return <div className="card p-5"><h2 className="font-extrabold text-lg mb-4">Người dùng</h2><div className="table-wrap"><table className="w-full text-sm"><thead className="bg-slate-50"><tr><th className="text-left p-3">Account</th><th className="text-left p-3">Tên</th><th className="text-left p-3">Vai trò</th><th className="text-left p-3">Phạm vi</th></tr></thead><tbody>{users.map(u=><tr className="border-t" key={u[0]}>{u.map(x=><td className="p-3" key={x}>{x}</td>)}</tr>)}</tbody></table></div></div>;
    }
    function Settings(){
      return <div className="card p-5"><h2 className="font-extrabold text-lg mb-3">Cài đặt</h2><div className="grid md:grid-cols-2 gap-3 text-sm"><div className="border rounded-xl p-4"><b>Frontend</b><p className="text-slate-500 mt-1">React SPA.</p></div><div className="border rounded-xl p-4"><b>Backend</b><p className="text-slate-500 mt-1">Node.js session + API proxy.</p></div><div className="border rounded-xl p-4"><b>Phân quyền</b><p className="text-slate-500 mt-1">Ẩn/hiện module theo vai trò.</p></div><div className="border rounded-xl p-4"><b>API</b><p className="text-slate-500 mt-1">Trình duyệt gọi `/api/...`.</p></div></div></div>;
    }

    function App(){
      const [user,setUser]=useState(null);
      const [checking,setChecking]=useState(true);
      useEffect(()=>{ api('/api/session').then(data=>setUser(data.user)).finally(()=>setChecking(false)); },[]);
      async function logout(){ await fetch('/api/logout',{method:'POST', credentials:'same-origin'}); setUser(null); }
      if (checking) return <div className="min-h-screen grid place-items-center"><span className="spinner"></span></div>;
      if (!user) return <Login onLogin={setUser}/>;
      return <Layout user={user} onLogout={logout}/>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
